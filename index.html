<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netlink Hardware Portal</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --dark: #0f172a;
            --light: #f1f5f9;
        }

        body { font-family: 'Inter', sans-serif; background: var(--light); margin: 0; padding: 20px; }
        
        /* Portal Overlay */
        #portal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);
            color: white; display: flex; justify-content: center; align-items: center; z-index: 1000;
        }

        .portal-box { background: rgba(255,255,255,0.05); padding: 50px; border-radius: 24px; backdrop-filter: blur(15px); text-align: center; border: 1px solid rgba(255,255,255,0.1); width: 350px; }
        
        .header { background: var(--dark); color: white; padding: 1.5rem; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Stats & Grid */
        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .card-content { padding: 20px; flex-grow: 1; }
        
        .tag { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; background: #eff6ff; color: #1e40af; }
        .price { font-size: 1.2rem; font-weight: 800; color: var(--success); }
        
        .btn { padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-buy { background: var(--primary); color: white; width: 100%; margin-top: 10px; }
        .btn-cart { background: #334155; color: white; }
        .btn-buying { background: var(--success); color: white; width: 100%; margin-bottom: 15px; font-size: 1.1rem; }
        
        /* Cart Modal */
        #cart-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 30px; border-radius: 15px; box-shadow: 0 0 50px rgba(0,0,0,0.5); z-index: 2000; width: 90%; max-width: 400px;
        }

        input { padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 10px; width: 80%; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="portal-overlay">
    <div class="portal-box">
        <h1 style="margin-bottom: 30px;">NETLINK SYSTEMS</h1>
        <button class="btn btn-buying" onclick="enterShop()">🛒 Buying</button>
        <p style="font-size: 0.7rem; opacity: 0.5; margin-top: 20px;">ADMINISTRATOR ACCESS</p>
        <input type="password" id="admin-pass" placeholder="Enter Key">
        <button class="btn" style="background: transparent; color: white; border: 1px solid white; width: 80%;" onclick="enterAdmin()">Login</button>
    </div>
</div>

<div id="main-content" class="hidden">
    <div class="header">
        <h2 id="view-title">Hardware Store</h2>
        <div>
            <button class="btn btn-cart" onclick="toggleCart()">View Cart (<span id="cart-count">0</span>)</button>
            <button class="btn" style="background: #ef4444; color: white;" onclick="location.reload()">Exit</button>
        </div>
    </div>

    <div id="admin-stats" class="stats-bar hidden">
        <div class="stat-card"><h4>Revenue</h4><p>$42,100</p></div>
        <div class="stat-card"><h4>Visitors</h4><p>1,029</p></div>
        <div class="stat-card"><h4>System Temp</h4><p>42°C</p></div>
        <div class="stat-card"><h4>Security</h4><p>Active</p></div>
    </div>

    <div class="product-grid" id="grid"></div>
</div>

<div id="cart-modal">
    <h3>Your Shopping Cart</h3>
    <div id="cart-items" style="max-height: 200px; overflow-y: auto; margin-bottom: 20px;"></div>
    <div style="border-top: 1px solid #eee; padding-top: 10px;">
        <strong>Total: $<span id="cart-total">0</span></strong>
    </div>
    <button class="btn btn-buy" onclick="toggleCart()">Continue Shopping</button>
    <button class="btn btn-buy" style="background: var(--success);" onclick="alert('Proceeding to Checkout...')">Checkout</button>
</div>

<script>
    let isAdmin = false;
    let cart = [];

    const products = [
        { name: "RTX 5090 GPU", cat: "Graphics", price: 1599, desc: "Ultimate ray-tracing performance for gaming and AI." },
        { name: "Ryzen 9 APU", cat: "Processors", price: 449, desc: "High-end processor with powerful integrated graphics." },
        { name: "32GB DDR5 RAM", cat: "Memory", price: 120, desc: "Ultra-fast dual-channel memory kit (6000MHz)." },
        { name: "2TB NVMe SSD", cat: "Storage", price: 160, desc: "Gen4 speeds for lightning-fast boot times." },
        { name: "AIO Liquid Cooler", cat: "Cooling", price: 135, desc: "240mm radiator with quiet RGB fans." },
        { name: "120mm Case Fan", cat: "Cooling", price: 15, desc: "High-airflow fan with vibration dampening." },
        { name: "Titan 850W PSU", cat: "Power", price: 110, desc: "80+ Gold Fully Modular Power Supply." }
    ];

    function enterShop() {
        isAdmin = false;
        document.getElementById('portal-overlay').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');
        loadProducts();
    }

    function enterAdmin() {
        if(document.getElementById('admin-pass').value === '201412') {
            isAdmin = true;
            document.getElementById('portal-overlay').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('admin-stats').classList.remove('hidden');
            loadProducts();
        } else { alert("Access Denied"); }
    }

    function loadProducts() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        products.forEach((p, index) => {
            grid.innerHTML += `
                <div class="card">
                    <div class="card-content">
                        <span class="tag">${p.cat}</span>
                        <h3>${p.name}</h3>
                        <p style="font-size: 0.85rem; color: #64748b;">${p.desc}</p>
                        <span class="price">$${p.price}</span>
                        ${isAdmin ? `<button class="btn" style="width:100%; margin-top:10px;" onclick="checkEdit()">Edit Item</button>` : ''}
                        <button class="btn btn-buy" onclick="addToCart(${index})">Add to Cart</button>
                    </div>
                </div>`;
        });
    }

    function addToCart(index) {
        cart.push(products[index]);
        updateCartUI();
    }

    function updateCartUI() {
        document.getElementById('cart-count').innerText = cart.length;
        const list = document.getElementById('cart-items');
        let total = 0;
        list.innerHTML = '';
        cart.forEach(item => {
            list.innerHTML += `<div style="display:flex; justify-content:space-between; font-size:0.9rem; margin-bottom:5px;">
                <span>${item.name}</span><span>$${item.price}</span>
            </div>`;
            total += item.price;
        });
        document.getElementById('cart-total').innerText = total;
    }

    function toggleCart() {
        const modal = document.getElementById('cart-modal');
        modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
    }

    function checkEdit() {
        if(prompt("Admin Edit Code:") === '888888') alert("Unlocked");
        else alert("Locked");
    }
</script>
</body>
</html>
