<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netlink Enterprise | Gold Star Portal</title>
    <style>
        :root { --primary: #2563eb; --success: #10b981; --dark: #0f172a; --gold: #f59e0b; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; margin: 0; padding: 0; }
        
        /* Entrance Portal */
        #portal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; color: white; display: flex; 
            justify-content: center; align-items: center; z-index: 2000;
        }
        .portal-box { text-align: center; background: rgba(255,255,255,0.05); padding: 40px; border-radius: 24px; border: 1px solid #334155; width: 400px; }

        header { 
            background: var(--dark); color: white; padding: 15px 30px; 
            position: sticky; top: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center; gap: 20px;
        }

        .search-bar { flex-grow: 1; max-width: 400px; padding: 8px 15px; border-radius: 20px; border: none; background: #1e293b; color: white; }

        .gold-star { background: var(--gold); color: black; padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: 800; display: inline-flex; align-items: center; gap: 4px; }

        .btn { border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; padding: 10px 20px; }
        .btn-google { background: white; color: #3c4043; border: 1px solid #dadce0; width: 100%; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-buy { background: var(--primary); color: white; width: 100%; margin-top: auto; }
        
        .container { padding: 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card { background: white; border-radius: 12px; padding: 15px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; transition: 0.3s; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="portal-overlay">
    <div class="portal-box">
        <h1>NETLINK ENTERPRISE</h1>
        <button class="btn" style="background:var(--success); color:white; width:100%;" onclick="enterApp(false)">🛒 Guest Buying</button>
        <button class="btn btn-google" onclick="googleLogin()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Logo.svg" width="18" alt="G">
            Sign in with Gmail
        </button>
        <div style="margin-top:30px; border-top: 1px solid #334155; padding-top:20px;">
            <input type="password" id="admin-pass" placeholder="Admin Key" style="background:#1e293b; border:none; color:white; padding:10px; border-radius:5px; width:80%; margin-bottom:10px;"><br>
            <button class="btn" style="background:transparent; border:1px solid white; color:white; font-size:0.8rem;" onclick="enterAdmin()">Staff Login</button>
        </div>
    </div>
</div>

<header id="main-header" class="hidden">
    <h2 style="margin:0; font-size:1.1rem;">Netlink</h2>
    <input type="text" id="search" class="search-bar" placeholder="Search components..." onkeyup="filterItems()">
    <div style="display:flex; gap:15px; align-items:center;">
        <div id="user-info" style="text-align:right; font-size:0.8rem;">
            <b id="user-name">Guest</b> <br>
            <span id="gold-star-label" class="hidden"><span class="gold-star">⭐ GOLD STAR</span></span>
        </div>
        <button class="btn" style="background:#ef4444; color:white; padding:5px 15px;" onclick="location.reload()">Exit</button>
    </div>
</header>

<div id="main-content" class="container hidden">
    <div class="product-grid" id="grid"></div>
</div>

<script>
    let isMember = false;
    let isAdmin = false;

    const products = [
        { name: "RTX 5090 Ti", cat: "GPU", price: 1999 }, { name: "Ryzen 9 9950X", cat: "CPU", price: 699 },
        { name: "Intel i9-14900K", cat: "CPU", price: 589 }, { name: "64GB DDR5 RAM", cat: "Memory", price: 210 },
        { name: "4TB NVMe SSD", cat: "Storage", price: 320 }, { name: "RX 7900 XTX", cat: "GPU", price: 949 },
        { name: "Liquid Arctic 360", cat: "Cooler", price: 145 }, { name: "Titan 1000W PSU", cat: "Power", price: 180 },
        { name: "RGB LED Strips", cat: "Modding", price: 25 }, { name: "Silent Case Fan", cat: "Cooling", price: 29 },
        { name: "Z790 Master", cat: "Mobo", price: 299 }, { name: "X670E Hero", cat: "Mobo", price: 350 },
        { name: "10Gbps LAN Card", cat: "Network", price: 85 }, { name: "Vertical Mount", cat: "Parts", price: 45 },
        { name: "Fan Hub Pro", cat: "Parts", price: 18 }, { name: "Thermal Paste X", cat: "Cooling", price: 12 },
        { name: "Mechanical KBD", cat: "Peripherals", price: 110 }, { name: "Wireless Mouse", cat: "Peripherals", price: 75 },
        { name: "4K 144Hz Monitor", cat: "Displays", price: 499 }, { name: "Full Tower Case", cat: "Cases", price: 150 }
    ];

    function googleLogin() {
        const email = prompt("Enter your @gmail.com address:");
        if(email && email.toLowerCase().endsWith("@gmail.com")) {
            isMember = true;
            document.getElementById('user-name').innerText = email.split('@')[0];
            document.getElementById('gold-star-label').classList.remove('hidden');
            enterApp();
        } else {
            alert("Invalid email. Must end with @gmail.com");
        }
    }

    function enterAdmin() {
        if(document.getElementById('admin-pass').value === '201412') {
            isAdmin = true;
            enterApp();
        } else { alert("Key Denied"); }
    }

    function enterApp() {
        document.getElementById('portal-overlay').classList.add('hidden');
        document.getElementById('main-header').classList.remove('hidden');
        document.getElementById('main-content').classList.remove('hidden');
        render(products);
    }

    function render(list) {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        list.forEach(p => {
            const finalPrice = isMember ? (p.price * 0.85).toFixed(2) : p.price;
            grid.innerHTML += `
                <div class="card">
                    <span style="font-size:0.6rem; color:var(--primary)">${p.cat}</span>
                    <h4 style="margin:5px 0">${p.name}</h4>
                    <div style="color:var(--success); font-weight:800;">$${finalPrice} ${isMember ? '<span style="font-size:0.6rem; color:#94a3b8; text-decoration:line-through;">$'+p.price+'</span>' : ''}</div>
                    ${isAdmin ? `<button onclick="adminEdit()" style="margin-top:5px; font-size:0.7rem;">Edit</button>` : ''}
                    <button class="btn btn-buy" style="padding:5px; font-size:0.8rem; margin-top:10px;">Buy</button>
                </div>`;
        });
    }

    function filterItems() {
        const query = document.getElementById('search').value.toLowerCase();
        const filtered = products.filter(p => p.name.toLowerCase().includes(query) || p.cat.toLowerCase().includes(query));
        render(filtered);
    }

    function adminEdit() {
        if(prompt("Code:") === '888888') alert("Unlocked");
    }
</script>
</body>
</html>
