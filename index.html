<style>
    /* ... existing styles ... */

    /* Header Fix for Screen Leaking */
    header { 
        background: var(--dark); 
        color: white; 
        padding: 10px 20px; 
        position: sticky; 
        top: 0; 
        z-index: 1000;
        display: flex; 
        flex-wrap: wrap; 
        justify-content: space-between; 
        align-items: center; 
        gap: 15px;
    }

    .header-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
    }

    /* Modern Delete Button for Cart */
    .btn-delete {
        background: #fee2e2;
        color: #ef4444;
        border: none;
        border-radius: 4px;
        padding: 2px 8px;
        cursor: pointer;
        font-size: 0.75rem;
        font-weight: bold;
        transition: 0.2s;
    }
    .btn-delete:hover { background: #fca5a5; }

    /* Cart Drawer Item Layout */
    .cart-item { 
        display: flex; 
        justify-content: space-between; 
        align-items: center;
        padding: 12px 0; 
        border-bottom: 1px solid #f1f5f9; 
    }
</style>

<div id="cart-drawer">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h3 style="margin:0;">Your Cart</h3>
        <button onclick="toggleCart()" style="background:none; border:none; cursor:pointer; font-size:1.8rem; color:#94a3b8;">&times;</button>
    </div>
    <div id="cart-items-list" style="flex-grow:1; overflow-y:auto;">
        </div>
    <div style="border-top: 2px solid #f1f5f9; padding-top:15px; margin-top:10px;">
        <div style="display:flex; justify-content:space-between; font-size:0.9rem;"><span>Subtotal:</span><span id="subtotal">$0.00</span></div>
        <div style="display:flex; justify-content:space-between; font-size:0.9rem; color:var(--danger);"><span>Tax (7%):</span><span id="tax-amount">$0.00</span></div>
        <div style="display:flex; justify-content:space-between; font-weight:800; font-size:1.2rem; margin-top:10px;">
            <span>TOTAL:</span><span id="cart-total" style="color:var(--success)">$0.00</span>
        </div>
        <button class="btn btn-buy" style="background:var(--success); margin-top:15px;" onclick="alert('Order Confirmed!')">CHECKOUT</button>
    </div>
</div>

<script>
    // ... existing variables ...

    // UPDATED UPDATECART FUNCTION
    function updateCart() {
        document.getElementById('cart-count').innerText = cart.length;
        const list = document.getElementById('cart-items-list');
        let subtotal = 0;
        list.innerHTML = '';

        // If cart is empty, show a message
        if (cart.length === 0) {
            list.innerHTML = '<p style="color:#94a3b8; text-align:center; margin-top:20px;">Your cart is empty.</p>';
        }

        cart.forEach((item, index) => {
            list.innerHTML += `
                <div class="cart-item">
                    <div style="display:flex; flex-direction:column;">
                        <span style="font-weight:600; font-size:0.85rem;">${item.name}</span>
                        <span style="color:var(--success); font-size:0.8rem;">$${item.price}</span>
                    </div>
                    <button class="btn-delete" onclick="removeFromCart(${index})">Remove</button>
                </div>`;
            subtotal += parseFloat(item.price);
        });
        
        const tax = subtotal * taxRate;
        const total = subtotal + tax;

        document.getElementById('subtotal').innerText = '$' + subtotal.toFixed(2);
        document.getElementById('tax-amount').innerText = '$' + tax.toFixed(2);
        document.getElementById('cart-total').innerText = '$' + total.toFixed(2);
    }

    // NEW FUNCTION TO DELETE ITEMS
    function removeFromCart(index) {
        cart.splice(index, 1); // Removes 1 item at the specific position
        updateCart();
    }
    
    // ... existing functions (googleLogin, enterAdmin, etc.) ...
</script>
