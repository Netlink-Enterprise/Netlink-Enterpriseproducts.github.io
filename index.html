<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netlink Enterprise & Shop</title>
    <style>
        :root {
            --primary: #2563eb;
            --admin: #dc2626;
            --success: #16a34a;
            --dark: #0f172a;
            --light: #f1f5f9;
        }

        body { font-family: 'Inter', sans-serif; background: var(--light); margin: 0; padding: 20px; }
        
        /* Entrance Portal */
        #portal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 1000;
        }

        .portal-box { background: rgba(255,255,255,0.1); padding: 40px; border-radius: 20px; backdrop-filter: blur(10px); text-align: center; border: 1px solid rgba(255,255,255,0.2); }
        
        .header { background: var(--dark); color: white; padding: 1rem 2rem; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); text-align: center; border-bottom: 3px solid var(--primary); }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .card-content { padding: 20px; }
        
        .tag { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; background: #e0e7ff; color: #3730a3; }
        .price { font-size: 1.3rem; font-weight: 800; color: var(--success); }
        
        .btn { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; margin: 5px; }
        .btn-buying { background: var(--success); color: white; font-size: 1.1rem; }
        .btn-admin { background: transparent; color: white; border: 1px solid white; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-edit { background: #e2e8f0; color: #475569; }
        
        input { padding: 12px; border-radius: 8px; border: none; margin-bottom: 10px; width: 200px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- Entrance Portal -->
<div id="portal-overlay">
    <div class="portal-box">
        <h1>Welcome to the Terminal</h1>
        <p>Please select your destination</p>
        <div style="margin-top: 20px;">
            <button class="btn btn-buying" onclick="enterShop()">🛒 Start Buying</button>
        </div>
        <hr style="margin: 30px 0; border: 0; border-top: 1px solid rgba(255,255,255,0.2);">
        <p style="font-size: 0.8rem; opacity: 0.7;">Staff Only</p>
        <input type="password" id="admin-pass" placeholder="Admin Password">
        <br>
        <button class="btn btn-admin" onclick="enterAdmin()">System Login</button>
    </div>
</div>

<!-- Main Application -->
<div id="main-content" class="hidden">
    <div class="header">
        <h2 id="view-title">Storefront</h2>
        <button class="btn btn-admin" onclick="location.reload()">Logout</button>
    </div>

    <!-- Admin Only Stats -->
    <div id="admin-stats" class="stats-bar hidden">
        <div class="stat-card"><h4>Total Revenue</h4><p>$12,450</p></div>
        <div class="stat-card"><h4>Stock Alerts</h4><p>2 Items Low</p></div>
        <div class="stat-card"><h4>Pending Shipments</h4><p>14</p></div>
        <div class="stat-card"><h4>Server Status</h4><p>Optimal</p></div>
    </div>

    <div class="product-grid" id="grid"></div>
</div>

<script>
    let isAdmin = false;

    const products = [
        { name: "Alpha Processor", cat: "Chips", price: "$45.00", desc: "High-speed computing core for custom builds." },
        { name: "HD Display Panel", cat: "Hardware", price: "$29.99", desc: "Vibrant IPS screen with 34-pin ribbon connector." },
        { name: "OS-Kernel Key", cat: "Software", price: "$15.00", desc: "Unlock full system permissions for your project." },
        { name: "Li-Po Power Pack", cat: "Power", price: "$19.50", desc: "Compact 5000mAh battery with smart charging." }
    ];

    function enterShop() {
        isAdmin = false;
        document.getElementById('portal-overlay').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');
        document.getElementById('view-title').innerText = "Customer Marketplace";
        loadProducts();
    }

    function enterAdmin() {
        const pass = document.getElementById('admin-pass').value;
        if(pass === '12345') {
            isAdmin = true;
            document.getElementById('portal-overlay').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('admin-stats').classList.remove('hidden');
            document.getElementById('view-title').innerText = "Admin Management Panel";
            loadProducts();
        } else {
            alert("Incorrect System Key");
        }
    }

    function handleEdit() {
        const pass = prompt("Enter Edit Authorization Code:");
        if(pass === '888888') {
            alert("Edit Access Granted.");
        } else {
            alert("Unauthorized!");
        }
    }

    function loadProducts() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        products.forEach(p => {
            grid.innerHTML += `
                <div class="card">
                    <div class="card-content">
                        <span class="tag">${p.cat}</span>
                        <h3>${p.name}</h3>
                        <p>${p.desc}</p>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px;">
                            <span class="price">${p.price}</span>
                            <div>
                                ${isAdmin ? `<button class="btn btn-edit" onclick="handleEdit()">Edit</button>` : ''}
                                <button class="btn btn-blue" onclick="alert('Added to cart!')">Buy</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });
    }
</script>
</body>
</html>
